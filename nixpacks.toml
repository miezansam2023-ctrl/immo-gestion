[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "find / -name 'Caddyfile' 2>/dev/null || true",
  "find / -name '*.caddy' 2>/dev/null || true",
  "find /etc -name 'php*' 2>/dev/null || true"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"